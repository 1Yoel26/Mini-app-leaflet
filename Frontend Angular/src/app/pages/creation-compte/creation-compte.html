<mat-card>

    <mat-card-title>Connection à votre compte</mat-card-title><br>

    <form [formGroup]="formGroup" (ngSubmit)="addNewCompte()">

        <mat-form-field [appearance]="'outline'">

            <mat-label>Nom</mat-label>

            <input matInput type="text" formControlName="nom">  

            <mat-error>
                Nom invalide
            </mat-error>

        </mat-form-field>

        <mat-form-field [appearance]="'outline'">

            <mat-label>Prenom</mat-label>

            <input matInput type="text" formControlName="prenom">  

            <mat-error>
                Prénom invalide
            </mat-error>

        </mat-form-field>

        <mat-form-field [appearance]="'outline'">

            <mat-label>Email</mat-label>

            <input matInput type="email" formControlName="email">  

            <mat-error>
                Email invalide
            </mat-error>

        </mat-form-field>



        <mat-form-field [appearance]="'outline'">

            <mat-label>Mot de passe</mat-label>
            <input matInput type="password" formControlName="motDePasse">

            <mat-error>
                Mot de passe invalide
            </mat-error>
            
        </mat-form-field>


        <button type="submit" mat-raised-button>Créer mon compte</button>



    </form>

</mat-card>
