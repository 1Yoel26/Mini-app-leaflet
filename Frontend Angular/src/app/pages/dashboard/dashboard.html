<table class="styled-table">

  <thead>
    <tr>
      <th>ID</th>
      <th>Description des utilisateurs</th>
      <th>Infos géographiques (GeoJSON)</th>
    </tr>
  </thead>

  <tbody>

    @for (unPoint of (laCoucheDesPoints | async); track unPoint.id) {
      <tr (click)="serviceRecuperationClicDashboard.recuperationLigneCliquer(unPoint.geomgeojson)">
        <td>{{ unPoint.id }}</td>
        <td>{{ unPoint.description }}</td>
        <td class="geo">{{ unPoint.geomgeojson }}</td>
      </tr>
    }

  </tbody>

</table>
