<!--Création du formulaire-->

<h2 class="titrePopup">Commentaire sur la zonne cliqué</h2> <br>


<div class="divPopupDuForm">

    <form [formGroup]="formulaireGroupePoint" (ngSubmit)="envoyerFormulaire()">
        <textarea formControlName="commentaireSurLaZonneSaisit"></textarea> 
        <button mat-raised-button type="submit" [disabled]="formulaireGroupePoint.invalid">Envoyer</button>
    </form>

</div>
